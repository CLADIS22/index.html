<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Username"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>
<input type="checkbox" id="showPassword"> Show Password<br><br>
<input type="register" id="register" placeholder="Register"><br><br>
<input type="checkbox" id="showRegister"> Show Register<br><br>
<input type="forgot" id="forgot" placeholder="Forgot Password"><br><br>
<input type="checkbox" id="showForgot"> Show Forgot Password<br><br>

<button onclick="login()">Login</button>


<script>
    function login() {
        var username = document.getElementById("username").value;
        var password = document.getElementById("password").value;

        // Check if the username and password match the admin credentials
        if (username === "admin" && password === "admin123") {
            // Redirect to the admin dashboard
            window.location.href = "admin.html";
        } else {
            // Redirect to the user dashboard
            window.location.href = "dashboard.html";
        }
    </script>
}


</body>
</html>
